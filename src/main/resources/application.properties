server.port=8080

# Unity API config (staging)
unity.api.base-url=https://api-stag.unity.smallcase.com
unity.api.gateway-secret=${GATEWAY_SECRET:}
unity.api.auth-token=${GATEWAY_AUTH_TOKEN:}
unity.api.partner-name=gatewaydemo-stag

# MongoDB (Unity DB — set MONGO_URI env var at runtime)
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/unity}
